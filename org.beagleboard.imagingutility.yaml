id: org.beagleboard.imagingutility
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm22
command: bb-imager-gui

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm22/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm22/lib
  env:
    CARGO_HOME: /run/build/bb-imager-gui/cargo

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  # SD Card permissions
  - --system-talk-name=org.freedesktop.UDisks2
  # BeagleConnect Freedom
  - --device=all

modules:
  - name: bb-imager-gui
    buildsystem: simple
    build-commands:
      - make package-gui-flatpak VERBOSE=1
    sources:
      - type: archive
        url: https://github.com/beagleboard/bb-imager-rs/archive/refs/tags/1.0.1.tar.gz
        sha256: dc7737ae086bf6ee8850a71c09b4d57371cb37a096119a91d27c629f2309b439
        x-checker-data:
          type: json
          url: https://api.github.com/repos/beagleboard/bb-imager-rs/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: '@uri "https://github.com/beagleboard/bb-imager-rs/archive/refs/tags/\(.tag_name).tar.gz"'
          timestamp-query: .published_at
      - type: archive
        url: https://github.com/beagleboard/bb-imager-rs/releases/download/1.0.1/cargo-vendor.tar.gz
        sha256: d18adacc897e8c1dc1c1967fc3f4438f7fd72e3766b7c451c8c24e66c4bba4f2
        dest: vendor
        x-checker-data:
          type: json
          url: https://api.github.com/repos/beagleboard/bb-imager-rs/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: '@uri "https://github.com/beagleboard/bb-imager-rs/releases/download/\(.tag_name)/cargo-vendor.tar.gz"'
          timestamp-query: .published_at
      - type: file
        path: config.toml
        dest: .cargo/
