id: org.beagleboard.imagingutility
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm22
command: bb-imager-gui

build-options:
  append-path: "/usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm22/bin"
  prepend-ld-library-path: /usr/lib/sdk/llvm22/lib
  env:
    CARGO_HOME: /run/build/bb-imager-gui/cargo

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  # SD Card permissions
  - --system-talk-name=org.freedesktop.UDisks2
  # BeagleConnect Freedom
  - --device=all

modules:
  - name: bb-imager-gui
    buildsystem: simple
    build-commands:
      - make package-gui-flatpak VERBOSE=1
    sources:
      - type: archive
        url: https://github.com/beagleboard/bb-imager-rs/archive/refs/tags/1.0.0.tar.gz
        sha256: e24d29d4bd41aa4f637e5cb10b70db68f533577e64b23719a722571ba31f3627
        x-checker-data:
          type: json
          url: https://api.github.com/repos/beagleboard/bb-imager-rs/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: '@uri "https://github.com/beagleboard/bb-imager-rs/archive/refs/tags/\(.tag_name).tar.gz"'
          timestamp-query: .published_at
      - type: archive
        url: https://github.com/beagleboard/bb-imager-rs/releases/download/1.0.0/cargo-vendor.tar.gz
        sha256: ca6d5f8a0d0c8d5b41bc2c6f14e8fc26432a024e5231a665392f9f82032d8783
        dest: vendor
        x-checker-data:
          type: json
          url: https://api.github.com/repos/beagleboard/bb-imager-rs/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: '@uri "https://github.com/beagleboard/bb-imager-rs/releases/download/\(.tag_name)/cargo-vendor.tar.gz"'
          timestamp-query: .published_at
      - type: file
        path: config.toml
        dest: .cargo/
